# Agro stratification config (example)
defaults:
  out: null # Default: None = output folder will be set to input video filename (without extension)
  manifest: "manifest.json"
  stride: 2
  dedup_method: "greedy"
  target_size: null # Default: None = threshold-based selection (configurable % of candidates)
  min_sharpness: 80.0
  min_contrast: 20.0
  novelty_threshold: 0.3

scoring:
  weights:
    quality: 0.5
    content_novelty: 0.5
  quality_components:
    sharpness: 0.35
    contrast: 0.30
    exposure: 0.25
    noise: 0.10
  novelty_memory: 64
  scale_ranges:
    sharpness: [80.0, 300.0]
    contrast: [20.0, 80.0]

embedding:
  hsv_bins: [16, 16, 16]
  lowres_size: [64, 36]

proxies:
  view_entropy_bins: 8
  green_cover_threshold: 0.6

selection:
  stratified_split_ratio: 0.5
  high_quality_threshold: 0.95
  threshold_selection_ratio: 0.25

deduplication:
  cosine_threshold: 0.85
  method: "greedy"
  eps: null # Auto-calculated if null, used for DBSCAN method
  min_samples: 1

output:
  jpeg_quality: 95
  log_intervals:
    frames_processed: 1000
    ml_scoring: 500
    frames_saved: 100

stratification:
  axes:
    altitude: [low, high] # letová výška
    view: [nadir, oblique] # typ pohledu: shora, šikmý
    cover: [sparse, dense] # typ pokryvu: řídká vegetace, hustá vegetace
    lighting: [dark, bright] # osvětlení scény: tmavé, světlé

  # Prahové hodnoty pro binning agro proxy hodnot
  thresholds:
    view_entropy: 1.8 # práh pro rozdělení nadir/oblique
    cover_ratio: 0.5 # práh pro rozdělení sparse/dense
    lighting_mean: 115 # práh pro rozdělení dark/bright

  # Per-axis target shares (breaking change).
  # Provide desired relative weights per axis value. Missing axis or values default to uniform.
  targets_axes:
    altitude:
      low: 0.6
      high: 0.4
    view:
      nadir: 0.5
      oblique: 0.5
    cover:
      sparse: 0.3
      dense: 0.7
    lighting:
      dark: 0.4
      bright: 0.6

  # Limity / ochrany proti dominanci špatně užitečných strat
  limits:
    sparse_max_ratio: 0.30 # max 30 % snímků z řídké vegetace

# Parametry pro zpracování obrazu a OpenCV operace
image_processing:
  # Sobel operátor parametry
  sobel_kernel_size: 3

  # Gaussian blur parametry
  gaussian_kernel_size: [3, 3]
  gaussian_sigma: 0

  # Noise score parametry
  noise_scaling_factor: 25.0

  # Exposure scoring parametry
  exposure:
    center_value: 128.0 # ideální střední hodnota
    underexposure_bins: 10 # počet bins pro underexposure (hist[:10])
    overexposure_start: 246 # start bin pro overexposure (hist[246:])
    center_penalty_weight: 0.6
    clip_penalty_weight: 0.4
    clip_multiplier: 2.0

# Matematické konstanty a fallback hodnoty
constants:
  fallback_fps: 30.0 # fallback FPS pokud nelze detekovat z videa
  dbscan_auto_eps_quantile: 0.90 # kvantil pro auto-výpočet DBSCAN eps
  dbscan_eps_bounds: [0.02, 0.30] # min/max bounds pro auto-eps
  epsilon: 1e-9 # malá hodnota pro prevenci dělení nulou
  epsilon_small: 1e-6 # ještě menší epsilon pro některé operace
